name: Bug report
description: Report broken or unexpected package behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this.
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: v1.0.0 or commit hash
    validations:
      required: true
  - type: input
    id: filament-version
    attributes:
      label: Filament version
      placeholder: 5.x
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: 11.x or 12.x
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include screenshots or rendered HTML snippets when the issue is visual.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Provide the smallest panel configuration or CSS/token override that demonstrates the issue.
      placeholder: |
        FilamentShadcnThemePlugin::make()
            ->style(...)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
