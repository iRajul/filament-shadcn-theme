name: tests

on:
  push:
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            illuminate: '^12.0'
            testbench: '^10.0'
          - php: '8.3'
            illuminate: '^13.0'
            testbench: '^11.0'
          - php: '8.4'
            illuminate: '^13.0'
            testbench: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, mbstring, pdo, sqlite
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --with "illuminate/support:${{ matrix.illuminate }}" --with "orchestra/testbench:${{ matrix.testbench }}" --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: composer test
