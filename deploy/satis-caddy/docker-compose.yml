services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./users.caddy:/etc/caddy/users.caddy:ro
      - ./public:/srv/pullpkg:ro
      - caddy_data:/data
      - caddy_config:/config

  satis:
    image: composer/satis:latest
    profiles:
      - build
    working_dir: /build
    environment:
      COMPOSER_HOME: /composer
    volumes:
      - ./satis.json:/build/satis.json:ro
      - ./public:/build/public
      - ./auth.json:/composer/auth.json:ro
    command:
      - build
      - /build/satis.json
      - /build/public

volumes:
  caddy_data:
  caddy_config:
